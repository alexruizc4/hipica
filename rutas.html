<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yeguada Carmen Martínez</title>
    <link rel="stylesheet" href="css/partials.css" />
    <link rel="stylesheet" href="css/iconos.css" />
    <link rel="stylesheet" href="css/ruta.css" />
    <link
      href="https://cdn.flaticon.com/kits/…/flaticon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header"></div>
    <div id="boton"></div>
    <main>
      <section class="lunadas-section">
        <p class="lunadas-label">Centro Ecuestre Yeguada Carmen Martínez</p>
        <h2>Lunadas a Caballo</h2>
        <p class="lunadas-tagline">Rutas nocturnas a la luz de la luna</p>
        <div class="lunadas-divider"></div>
        <div class="lunadas-gallery">
          <div class="lunadas-gallery__item">
            <img src="media/ruta/5.jpeg" alt="Caballo al atardecer" />
          </div>
          <div class="lunadas-gallery__item">
            <img src="media/ruta/1.jpeg" alt="Dos caballos blancos" />
          </div>
          <div class="lunadas-gallery__item">
            <img src="media/ruta/2.jpeg" alt="Luna llena" />
          </div>
          <div class="lunadas-gallery__item">
            <img src="media/ruta/4.jpeg" alt="Grupo en ruta nocturna" />
          </div>
          <div class="lunadas-gallery__item">
            <img src="media/ruta/3.jpeg" alt="Silueta de caballo al anochecer" />
          </div>
        </div>
        <div class="lunadas-info">
          <div class="lunadas-card">
            <div class="lunadas-card__icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
            </div>
            <p class="lunadas-card__label">Fechas</p>
            <div class="lunadas-card__content">
              <strong>Sábado 6 Mayo</strong><br />
              <strong>Sábado 3 Junio</strong><br />
              <strong>Sábado 1 Julio</strong>
            </div>
          </div>
          <div class="lunadas-card">
            <div class="lunadas-card__icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="9" />
                <polyline points="12 7 12 12 15 15" />
              </svg>
            </div>
            <p class="lunadas-card__label">Detalles</p>
            <div class="lunadas-card__content">
              <strong>Duración</strong><br />
              2h y media<br /><br />
              <strong>Hora de salida</strong><br />
              22:00 h
            </div>
          </div>
          <div class="lunadas-card lunadas-card--contact">
            <div class="lunadas-card__icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2A19.8 19.8 0 0 1 3.08 4.18 2 2 0 0 1 5.09 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"
                />
              </svg>
            </div>
            <p class="lunadas-card__label">Información y reserva</p>
            <p class="lunadas-card__phone">TLF.: 626 229 727</p>
            <div class="lunadas-card__socials">
              <a
                href="https://wa.me/34626229727"
                target="_blank"
                aria-label="WhatsApp"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"
                  />
                </svg>
              </a>
              <a href="#" target="_blank" aria-label="Facebook">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"
                  />
                </svg>
              </a>
              <a href="#" target="_blank" aria-label="Instagram">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
                  <circle cx="12" cy="12" r="4" />
                  <circle
                    cx="17.5"
                    cy="6.5"
                    r="0.5"
                    fill="#d9ccb8"
                    stroke="none"
                  />
                </svg>
              </a>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div id="footer"></div>
    <script src="js/include.js"></script>
  </body>
</html>
